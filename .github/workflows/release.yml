name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: kannaka-tui-windows-x86_64.exe
          # Pinned to ubuntu-22.04 (glibc 2.35). 2.39 from ubuntu-latest
          # is too new for Oracle Linux 9, Debian 12, Fedora ≤39, RHEL 9,
          # and stock Ubuntu 22.04 — same reasoning as kannaka-memory.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: kannaka-tui-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: kannaka-tui-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: kannaka-tui-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: kannaka-tui-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile linker (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat > .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary + SHA-256 sidecar
        # kannaka v0.6.2+ verifies the .sha256 sidecar before atomic
        # rename in self_update — same pattern as kannaka-memory's
        # release.yml. ADR-0029 Phase 4a.
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/kannaka-tui.exe ${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/kannaka-tui ${{ matrix.artifact }}
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload SHA-256 sidecar
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}.sha256
          path: ${{ matrix.artifact }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
